<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus By Alex - Pro Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: rgba(255, 255, 255, 0.02);
            --text: #fafafa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
            --input: #18181b;
            --accent: #3b82f6;
        }

        .light-theme {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.05);
            --input: #f1f5f9;
            --accent: #2563eb;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            backdrop-filter: blur(20px);
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.6);
        }

        input, select {
            background-color: var(--input) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
        }

        .task-done { text-decoration: line-through; opacity: 0.3; filter: grayscale(1); }
        
        #progressFill {
            transition: width 0.7s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .hidden { display: none !important; }

        /* Custom shadow for the primary button to match your screenshot */
        .btn-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-12">

    <div id="landingScreen" class="w-full max-w-2xl glass-card rounded-[3rem] p-12 md:p-20 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600 bg-clip-text text-transparent mb-2">
            Focus By Alex
        </h1>
        <div class="text-xs font-semibold uppercase tracking-[0.3em] opacity-40 mb-8">
            Stay on track
        </div>
        
        <p class="text-[var(--text-muted)] text-lg mb-12 leading-relaxed max-w-sm mx-auto font-medium">
            A workspace designed to help you organise goals and reclaim productivity.
        </p>
        
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl text-xl font-extrabold transition-all active:scale-[0.98] btn-glow">
            Sign in with Google
        </button>
    </div>

    <div id="mainApp" class="w-full max-w-3xl glass-card rounded-[3rem] p-10 md:p-16 hidden">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600 bg-clip-text text-transparent">
                    Focus By Alex
                </h1>
                <div class="flex items-center gap-6 mt-4">
                    <div id="stats" class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40">
                        0 Tasks Remaining
                    </div>
                    <button onclick="logout()" class="text-[10px] font-bold uppercase tracking-widest text-rose-500/60 hover:text-rose-400 transition-colors">
                        ✕ Logout
                    </button>
                </div>
            </div>
            <button onclick="toggleTheme()" id="themeBtn" class="w-14 h-14 flex items-center justify-center rounded-2xl bg-[var(--input)] border border-[var(--border)] hover:scale-105 transition-all text-2xl">
                🌙
            </button>
        </header>

        <div class="mb-14">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em]">Journey Progress</span>
                <span id="progressPercent" class="text-sm font-black text-blue-500">0%</span>
            </div>
            <div class="w-full h-1.5 bg-[var(--input)] rounded-full border border-[var(--border)] overflow-hidden">
                <div id="progressFill" class="h-full bg-gradient-to-r from-blue-600 to-purple-600" style="width: 0%"></div>
            </div>
        </div>

        <div class="p-10 rounded-[2.5rem] bg-[var(--input)] border border-[var(--border)] mb-10">
            <input type="text" id="taskInput" placeholder="What is your main focus today?" 
                class="w-full bg-transparent !border-0 !p-0 mb-8 text-2xl font-light placeholder:opacity-20 focus:ring-0">
            
            <div class="flex flex-col md:flex-row gap-4">
                <select id="priorityInput" class="px-6 py-4 rounded-xl text-xs font-bold uppercase tracking-widest focus:outline-none cursor-pointer">
                    <option value="1">Low Priority</option>
                    <option value="2">Medium Priority</option>
                    <option value="3">High Priority</option>
                </select>
                <input type="date" id="dateInput" class="px-6 py-4 rounded-xl text-sm font-medium focus:outline-none opacity-60">
                <button onclick="addTask()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black uppercase tracking-widest transition-all btn-glow">
                    Add Task
                </button>
            </div>
        </div>

        <ul id="taskList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></ul>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARBwnkKCK5cu-YPro8dUQBjIwi6mjzjzQ",
            authDomain: "focus-by-alex-3e956.firebaseapp.com",
            projectId: "focus-by-alex-3e956",
            storageBucket: "focus-by-alex-3e956.firebasestorage.app",
            messagingSenderId: "1073410411692",
            appId: "1:1073410411692:web:5aa2f0d1e89b24985de309"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        let tasks = [];
        let isDark = true;

        auth.onAuthStateChanged(user => {
            const landing = document.getElementById('landingScreen');
            const app = document.getElementById('mainApp');
            if (user) {
                landing.classList.add('hidden');
                app.classList.remove('hidden');
                loadTasks(user.uid);
            } else {
                landing.classList.remove('hidden');
                app.classList.add('hidden');
            }
        });

        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-theme');
            document.getElementById('themeBtn').innerHTML = isDark ? '🌙' : '☀️';
        }

        const priorityMap = {
            '1': { label: 'Low', color: 'text-blue-500 border-blue-500/20 bg-blue-500/5' },
            '2': { label: 'Medium', color: 'text-amber-500 border-amber-500/20 bg-amber-500/5' },
            '3': { label: 'High', color: 'text-rose-500 border-rose-500/20 bg-rose-500/5' }
        };

        function addTask() {
            const user = auth.currentUser;
            const input = document.getElementById('taskInput');
            if (!user || !input.value.trim()) return;

            db.collection('tasks').add({
                uid: user.uid,
                text: input.value,
                priority: document.getElementById('priorityInput').value,
                date: document.getElementById('dateInput').value,
                completed: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        }

        function loadTasks(uid) {
            db.collection('tasks').where('uid', '==', uid).orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    tasks = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    render();
                });
        }

        function toggleTask(id, currentStatus) {
            db.collection('tasks').doc(id).update({ completed: !currentStatus });
        }

        function deleteTask(id) {
            db.collection('tasks').doc(id).delete();
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let completedCount = 0;

            tasks.forEach(task => {
                if(task.completed) completedCount++;
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-6 rounded-3xl border border-[var(--border)] bg-[var(--card)] transition-all`;
                li.innerHTML = `
                    <div class="flex items-center gap-6">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.completed})" 
                            class="w-6 h-6 rounded-lg border-2 border-[var(--border)] bg-[var(--input)] cursor-pointer appearance-none checked:bg-blue-600 checked:border-blue-600 transition-all">
                        <div>
                            <p class="text-lg font-medium ${task.completed ? 'task-done' : ''}">${task.text}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="text-[9px] uppercase px-2 py-1 rounded border font-black ${priorityMap[task.priority].color}">
                                    ${priorityMap[task.priority].label}
                                </span>
                                ${task.date ? `<span class="text-[10px] opacity-30 font-bold">📅 ${task.date}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteTask('${task.id}')" class="text-rose-500/40 hover:text-rose-500 p-2 transition-colors">✕</button>
                `;
                list.appendChild(li);
            });

            const total = tasks.length;
            const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressPercent').innerText = percentage + '%';
            document.getElementById('stats').innerText = `${total - completedCount} Tasks Remaining`;
        }
    </script>
</body>
</html>
