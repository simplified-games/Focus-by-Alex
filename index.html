<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus By Alex - Ultimate Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: rgba(255, 255, 255, 0.02);
            --text: #fafafa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
            --input: #18181b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            transition: background-color 0.4s ease;
        }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            backdrop-filter: blur(20px);
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.6);
        }

        input, select, textarea {
            background-color: var(--input) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
        }

        .task-done { text-decoration: line-through; opacity: 0.3; filter: grayscale(1); }
        
        .btn-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-12">

    <div id="landingScreen" class="w-full max-w-2xl glass-card rounded-[3.5rem] p-12 md:p-20 text-center">
        <h1 class="text-6xl font-black tracking-tighter bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600 bg-clip-text text-transparent mb-2">
            Focus By Alex
        </h1>
        <div class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 mb-10">Premium Productivity</div>
        <p class="text-[var(--text-muted)] text-lg mb-12 font-medium max-w-xs mx-auto">Master your day with the ultimate minimalist workspace.</p>
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl text-xl font-black transition-all btn-glow active:scale-95">
            Sign in with Google
        </button>
    </div>

    <div id="mainApp" class="w-full max-w-3xl glass-card rounded-[3.5rem] p-8 md:p-14 hidden">
        
        <header class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-4xl font-black tracking-tighter bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600 bg-clip-text text-transparent">Focus By Alex</h1>
                <div class="flex items-center gap-4 mt-4">
                    <div id="stats" class="text-[10px] font-bold uppercase tracking-widest opacity-40">0 Tasks Remaining</div>
                    <button onclick="clearCompleted()" class="text-[10px] font-bold uppercase tracking-widest text-rose-500/60 hover:text-rose-400">✕ Clear Done</button>
                    <button onclick="logout()" class="text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100">Logout</button>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-[var(--input)] p-2 rounded-2xl border border-[var(--border)]">
                <select id="sortControl" onchange="render()" class="bg-transparent border-none text-[10px] font-black uppercase tracking-widest focus:ring-0 cursor-pointer">
                    <option value="newest">Newest</option>
                    <option value="priority">Priority</option>
                    <option value="dueDate">Due Date</option>
                </select>
            </div>
        </header>

        <div class="mb-10">
            <div class="flex justify-between mb-2"><span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Journey Progress</span><span id="progressPercent" class="text-xs font-black text-blue-500">0%</span></div>
            <div class="w-full h-1 bg-[var(--input)] rounded-full overflow-hidden border border-[var(--border)]">
                <div id="progressFill" class="h-full bg-blue-600 transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div class="relative mb-8">
            <input type="text" id="searchInput" oninput="render()" placeholder="Search goals..." 
                class="w-full pl-12 pr-6 py-4 rounded-2xl text-sm border border-[var(--border)] focus:ring-1 focus:ring-blue-500/50 outline-none">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 opacity-20">🔍</span>
        </div>

        <div class="p-8 rounded-[2.5rem] bg-[var(--input)] border border-[var(--border)] mb-10">
            <input type="text" id="taskInput" placeholder="Task Title..." class="w-full bg-transparent !border-0 !p-0 mb-4 text-2xl font-bold placeholder:opacity-20 focus:ring-0">
            <textarea id="descInput" placeholder="Add a description/goal detail..." class="w-full bg-transparent !border-0 !p-0 mb-6 text-sm opacity-60 placeholder:opacity-20 focus:ring-0 resize-none h-12"></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <select id="priorityInput" class="px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest cursor-pointer">
                    <option value="1">Low Priority</option>
                    <option value="2">Medium Priority</option>
                    <option value="3">High Priority</option>
                </select>
                <input type="date" id="dateInput" class="px-4 py-3 rounded-xl text-xs font-bold opacity-60">
                <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-[10px] btn-glow">Add Task</button>
            </div>
        </div>

        <ul id="taskList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></ul>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARBwnkKCK5cu-YPro8dUQBjIwi6mjzjzQ",
            authDomain: "focus-by-alex-3e956.firebaseapp.com",
            projectId: "focus-by-alex-3e956",
            storageBucket: "focus-by-alex-3e956.firebasestorage.app",
            messagingSenderId: "1073410411692",
            appId: "1:1073410411692:web:5aa2f0d1e89b24985de309"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        let tasks = [];

        auth.onAuthStateChanged(user => {
            document.getElementById('landingScreen').classList.toggle('hidden', !!user);
            document.getElementById('mainApp').classList.toggle('hidden', !user);
            if (user) loadTasks(user.uid);
        });

        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        function addTask() {
            const user = auth.currentUser;
            const title = document.getElementById('taskInput').value;
            const desc = document.getElementById('descInput').value;
            if (!user || !title.trim()) return;

            db.collection('tasks').add({
                uid: user.uid,
                text: title,
                description: desc,
                priority: document.getElementById('priorityInput').value,
                date: document.getElementById('dateInput').value,
                completed: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('taskInput').value = '';
            document.getElementById('descInput').value = '';
        }

        function loadTasks(uid) {
            db.collection('tasks').where('uid', '==', uid).onSnapshot(snapshot => {
                tasks = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                render();
            });
        }

        function clearCompleted() {
            if(!confirm("Clear all finished goals?")) return;
            tasks.filter(t => t.completed).forEach(t => db.collection('tasks').doc(t.id).delete());
        }

        function toggleTask(id, currentStatus) { db.collection('tasks').doc(id).update({ completed: !currentStatus }); }
        function deleteTask(id) { db.collection('tasks').doc(id).delete(); }

        function render() {
            const list = document.getElementById('taskList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortControl').value;
            list.innerHTML = '';
            
            let filtered = tasks.filter(t => t.text.toLowerCase().includes(search));

            filtered.sort((a, b) => {
                if (sortBy === 'priority') return b.priority - a.priority;
                if (sortBy === 'dueDate') return new Date(a.date || '9999') - new Date(b.date || '9999');
                return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
            });

            filtered.forEach(task => {
                const li = document.createElement('li');
                li.className = `p-6 rounded-[2rem] border border-[var(--border)] bg-[var(--card)] transition-all mb-4`;
                li.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex items-start gap-4">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.completed})" 
                                class="w-6 h-6 mt-1 rounded-lg border-2 border-[var(--border)] bg-[var(--input)] appearance-none checked:bg-blue-600 transition-all cursor-pointer">
                            <div>
                                <p class="text-lg font-bold ${task.completed ? 'task-done' : ''}">${task.text}</p>
                                ${task.description ? `<p class="text-xs opacity-40 mt-1 max-w-sm">${task.description}</p>` : ''}
                                <div class="flex items-center gap-3 mt-3">
                                    <span class="text-[8px] font-black uppercase px-2 py-0.5 rounded border border-blue-500/20 text-blue-500 bg-blue-500/5">P${task.priority}</span>
                                    ${task.date ? `<span class="text-[9px] opacity-30 font-bold">📅 ${task.date}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <button onclick="deleteTask('${task.id}')" class="text-rose-500/30 hover:text-rose-500 text-xl">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });

            const completed = tasks.filter(t => t.completed).length;
            const percent = tasks.length === 0 ? 0 : Math.round((completed / tasks.length) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = percent + '%';
            document.getElementById('stats').innerText = `${tasks.length - completed} Tasks Remaining`;
        }
    </script>
</body>
</html>
