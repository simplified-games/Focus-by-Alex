<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus By Alex</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* Titles */
        h1 { font-size: 1.8rem; color: #333; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; color: #666; font-weight: normal; margin-top: 0; }
        
        .description {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #login-btn {
            background-color: #4285F4;
            color: white;
            width: 100%;
        }

        #login-btn:hover { background-color: #357ae8; }

        #logout-btn {
            background-color: #ff4b2b;
            color: white;
            margin-top: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .task-list { text-align: left; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing-screen" class="container">
        <h1>Focus By Alex</h1>
        <h2>Stay on track.</h2>
        <p class="description">
            A workspace and organiser designed to help you complete tasks, 
            track your goals, and reclaim focus!
        </p>
        <button id="login-btn">Sign in with Google</button>
    </div>

    <div id="main-app" class="container hidden">
        <h1>My Tasks</h1>
        <p id="welcome-msg"></p>
        
        <input type="text" id="taskInput" placeholder="Enter a new goal...">
        <button onclick="addTask()" style="background: #28a745; color: white;">Add Goal</button>

        <div class="task-list" id="taskList"></div>

        <button id="logout-btn">Logout</button>
    </div>

    <script>
        
        const firebaseConfig = {

  apiKey: "AIzaSyARBwnkKCK5cu-YPro8dUQBjIwi6mjzjzQ",

  authDomain: "focus-by-alex-3e956.firebaseapp.com",

  projectId: "focus-by-alex-3e956",

  storageBucket: "focus-by-alex-3e956.firebasestorage.app",

  messagingSenderId: "1073410411692",

  appId: "1:1073410411692:web:5aa2f0d1e89b24985de309"

};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // Elements
        const landingScreen = document.getElementById('landing-screen');
        const mainApp = document.getElementById('main-app');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const taskList = document.getElementById('taskList');

        // Logic to switch screens
        auth.onAuthStateChanged(user => {
            if (user) {
                landingScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Hello, ${user.displayName}`;
                loadTasks(user.uid);
            } else {
                landingScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        // Login / Logout
        loginBtn.onclick = () => auth.signInWithPopup(provider);
        logoutBtn.onclick = () => auth.signOut();

        // Database Functions
        function addTask() {
            const user = auth.currentUser;
            const task = document.getElementById('taskInput').value;
            if (user && task) {
                db.collection('tasks').add({
                    uid: user.uid,
                    text: task,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('taskInput').value = '';
            }
        }

        function loadTasks(uid) {
            db.collection('tasks').where('uid', '==', uid).orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    taskList.innerHTML = '';
                    snapshot.forEach(doc => {
                        const p = document.createElement('p');
                        p.innerText = "• " + doc.data().text;
                        taskList.appendChild(p);
                    });
                });
        }
    </script>
</body>
</html>
